<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>홍길동 | 개발자 포트폴리오</title>
    <meta
      name="description"
      content="문제를 구조화하고 제품으로 완성하는 개발자 홍길동의 포트폴리오입니다."
    />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon-placeholder.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#about">본문으로 바로가기</a>

    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="#about" aria-label="소개 섹션으로 이동">HONG GILDONG</a>
        <nav class="main-nav" aria-label="주요 메뉴">
          <ul>
            <li><a href="#about">소개</a></li>
            <li><a href="#skills">기술</a></li>
            <li><a href="#projects">프로젝트</a></li>
            <li><a href="#contact">연락처</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section id="about" class="section hero reveal" aria-labelledby="profile-name">
        <div class="container hero-grid">
          <figure class="avatar-frame">
            <img
              src="./assets/profile-placeholder.svg"
              alt="개발자 프로필 이미지 플레이스홀더"
              width="320"
              height="320"
            />
          </figure>
          <div class="hero-copy">
            <p class="eyebrow" id="profile-role"></p>
            <h1 id="profile-name"></h1>
            <p class="lead" id="profile-summary"></p>
            <p class="location" id="profile-location"></p>
            <div class="cta-group">
              <a class="btn btn-primary" href="#projects">프로젝트 보기</a>
              <a class="btn btn-secondary" href="#contact">연락하기</a>
            </div>
          </div>
        </div>
      </section>

      <section id="skills" class="section reveal" aria-labelledby="skills-title">
        <div class="container">
          <h2 id="skills-title">기술 스택</h2>
          <p class="section-intro">
            제품 가치를 빠르게 전달하기 위해 자주 사용하는 기술을 카테고리별로 정리했습니다.
          </p>
          <div id="skills-grid" class="skills-grid" aria-live="polite"></div>
        </div>
      </section>

      <section id="projects" class="section reveal" aria-labelledby="projects-title">
        <div class="container">
          <h2 id="projects-title">프로젝트</h2>
          <p class="section-intro">
            문제를 정의하고 해결한 방식, 그리고 결과를 중심으로 정리한 주요 작업입니다.
          </p>
          <div id="projects-grid" class="projects-grid" aria-live="polite"></div>
        </div>
      </section>

      <section id="contact" class="section reveal" aria-labelledby="contact-title">
        <div class="container contact-box">
          <h2 id="contact-title">연락처</h2>
          <p>
            협업 제안, 채용 문의, 기술 대화 모두 환영합니다. 아래 링크로 편하게 연락 주세요.
          </p>
          <div id="contact-links" class="contact-links" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p><span id="current-year"></span> 홍길동. Built for GitHub Pages.</p>
      </div>
    </footer>
  </body>
</html>
