<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>이명준 | 사업기획 포트폴리오</title>
    <meta
      name="description"
      content="사내벤처 프로그램, 오픈이노베이션, CBDC 결제수단 도입을 추진하는 사업기획 이명준의 포트폴리오입니다."
    />
    <link rel="icon" type="image/svg+xml" href="./assets/favicon-placeholder.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./script.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#about">본문으로 바로가기</a>

    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="#about" aria-label="소개 섹션으로 이동">이명준</a>
        <nav class="main-nav" aria-label="주요 메뉴">
          <ul>
            <li><a href="#about">소개</a></li>
            <li><a href="#skills">역량</a></li>
            <li><a href="#projects">사례</a></li>
            <li><a href="#contact">연락처</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section id="about" class="section hero reveal" aria-labelledby="profile-name">
        <div class="container hero-grid">
          <figure class="avatar-frame">
            <img
              src="./assets/profile-placeholder.svg"
              alt="프로필 이미지 플레이스홀더"
              width="320"
              height="320"
            />
          </figure>
          <div class="hero-copy">
            <p class="eyebrow" id="profile-role"></p>
            <h1 id="profile-name"></h1>
            <p class="lead" id="profile-summary"></p>
            <p class="location" id="profile-location"></p>
            <div class="cta-group">
              <a class="btn btn-primary" href="#projects">사례 보기</a>
              <a class="btn btn-secondary" href="#contact">연락하기</a>
            </div>
          </div>
        </div>
      </section>

      <section id="skills" class="section reveal" aria-labelledby="skills-title">
        <div class="container">
          <h2 id="skills-title">핵심 역량</h2>
          <p class="section-intro">
            시장 분석부터 실행 관리까지, 사업기획 업무에서 성과를 낸 역량을 카테고리별로 정리했습니다.
          </p>
          <div id="skills-grid" class="skills-grid" aria-live="polite"></div>
        </div>
      </section>

      <section id="projects" class="section reveal" aria-labelledby="projects-title">
        <div class="container">
          <h2 id="projects-title">주요 사례</h2>
          <p class="section-intro">
            기회 발굴부터 실행, 성과 검증까지 사업기획 관점에서 추진한 핵심 사례를 정리했습니다.
          </p>
          <div id="projects-grid" class="projects-grid" aria-live="polite"></div>
        </div>
      </section>

      <section id="contact" class="section reveal" aria-labelledby="contact-title">
        <div class="container contact-box">
          <h2 id="contact-title">연락처</h2>
          <p>
            협업 제안, 채용 문의, 사업 전략 논의 모두 환영합니다. 아래 링크로 편하게 연락 주세요.
          </p>
          <div id="contact-links" class="contact-links" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p><span id="current-year"></span> 이명준. GitHub Pages에서 운영 중입니다.</p>
      </div>
    </footer>
  </body>
</html>
